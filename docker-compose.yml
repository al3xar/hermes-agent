#
# docker-compose.yml for Hades Agent
#
# Usage:
#   HADES_UID=$(id -u) HADES_GID=$(id -g) docker compose up -d
#
# Set HADES_UID / HADES_GID to the host user that owns ~/.hades so
# files created inside the container stay readable/writable on the host.
# The s6-overlay stage2 hook remaps the internal `hades` user to these
# values via usermod/groupmod; each supervised service then drops to that
# user via `s6-setuidgid`.
#
# Security notes:
#   - The dashboard service binds to 127.0.0.1 by default. It stores API
#     keys; exposing it on LAN without auth is unsafe. If you want remote
#     access, use an SSH tunnel or put it behind a reverse proxy that
#     adds authentication — do NOT pass --insecure --host 0.0.0.0.
#   - If you override entrypoint, keep `/init` as the first command in
#     the chain (or let docker use the image's default ENTRYPOINT,
#     which is `["/init", "/opt/hades/docker/main-wrapper.sh"]`).
#     `/init` is s6-overlay's PID 1 — it runs the cont-init.d scripts
#     (chown, profile reconcile, dashboard toggle) and sets up the
#     supervision tree before any service starts. Bypassing it skips
#     all of that setup and the gateway will not work correctly.
#   - The gateway's API server is off unless you uncomment API_SERVER_KEY
#     and API_SERVER_HOST. See docs/user-guide/api-server.md before doing
#     this on an internet-facing host.
#
services:
  gateway:
    image: al3xar/hades-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hades
    restart: unless-stopped
    network_mode: host
    # Volúmenes deshabilitados temporalmente: en Podman daban problemas de
    # permisos de escritura. Todo corre dentro del contenedor por ahora; los
    # datos en /opt/data NO persisten entre recreaciones del contenedor.
    volumes:
      #   - ~/.hades:/opt/data
      # Hades lee el config en $HADES_HOME/config.yaml (= /opt/data/config.yaml),
      # NO en /opt/data/.hades (ese montaje antiguo era una ruta muerta). Bind
      # del fichero concreto, read-only: sombrea el config sembrado por defecto
      # sin tocar el resto del home (volumen anónimo) y sin los problemas de
      # permisos de escritura de Podman.
      - ./.hades-config/config.yaml:/opt/data/config.yaml:ro
    environment:
      - HADES_UID=${HADES_UID:-501}
      - HADES_GID=${HADES_GID:-20}
      - ATHENA_VLLM_KEY=${ATHENA_VLLM_KEY}
      # To expose the OpenAI-compatible API server beyond localhost,
      # uncomment BOTH lines (API_SERVER_KEY is mandatory for auth):
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}
      # Microsoft Teams — uncomment and fill in to enable Teams gateway.
      # Register your bot at https://dev.botframework.com/ to get these values.
      # - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID}
      # - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET}
      # - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      # - TEAMS_ALLOWED_USERS=${TEAMS_ALLOWED_USERS}
      # - TEAMS_PORT=${TEAMS_PORT:-3978}
      # Google Chat — uncomment and fill in to enable the Google Chat gateway.
      # See website/docs/user-guide/messaging/google_chat.md for the full setup.
      # The SA JSON path must point to a file mounted into the container —
      # add a volume entry above (e.g. ``- ~/.hades/google-chat-sa.json:/secrets/google-chat-sa.json:ro``)
      # then set GOOGLE_CHAT_SERVICE_ACCOUNT_JSON to that mount path.
      # - GOOGLE_CHAT_PROJECT_ID=${GOOGLE_CHAT_PROJECT_ID}
      # - GOOGLE_CHAT_SUBSCRIPTION_NAME=${GOOGLE_CHAT_SUBSCRIPTION_NAME}
      # - GOOGLE_CHAT_SERVICE_ACCOUNT_JSON=${GOOGLE_CHAT_SERVICE_ACCOUNT_JSON}
      # - GOOGLE_CHAT_ALLOWED_USERS=${GOOGLE_CHAT_ALLOWED_USERS}
    command: ["gateway", "run"]

  dashboard:
    image: al3xar/hades-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hades-dashboard
    restart: unless-stopped
    # Sin network_mode: host. En macOS + Podman, host networking bindea a la
    # VM (no al Mac) e ignora el mapeo `ports`, dejando el dashboard
    # inalcanzable desde localhost del host. Con red bridge + `ports` de abajo,
    # gvproxy reenvía localhost:9119 del Mac → contenedor:9119.
    depends_on:
      - gateway
    # Volúmenes deshabilitados temporalmente (ver nota en el servicio gateway).
    # volumes:
    #   - ./.hades-config:/opt/data/.hades:ro
    ports:
      - 9119:9119
    environment:
      - HADES_UID=${HADES_UID:-501}
      - HADES_GID=${HADES_GID:-20}
      - HADES_HOME=/tmp/hades
      - ATHENA_VLLM_KEY=${ATHENA_VLLM_KEY}
    # Sin este `command`, la imagen arranca el agente interactivo por defecto,
    # que muere al no haber TTY y entra en bucle de reinicio. `dashboard`
    # levanta la web UI. La primera vez construye el bundle con npm (no hay
    # dist pre-construido en la imagen), así que --skip-build no es viable.
    # --no-open evita que intente abrir un navegador.
    #
    # --host 0.0.0.0 lo hace accesible desde fuera del contenedor; requiere
    # --insecure (el dashboard se niega a bindear fuera de localhost sin él).
    # ⚠ ATENCIÓN: el dashboard almacena API keys y NO tiene auth por defecto.
    # Exponerlo en 0.0.0.0 lo deja accesible para cualquiera que alcance el
    # puerto 9119. Úsalo solo en una red de confianza o detrás de un proxy
    # con autenticación.
    command: ["dashboard", "--no-open", "--host", "0.0.0.0", "--insecure"]
