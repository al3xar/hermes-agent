apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hades.fullname" . }}-dashboard
  labels: {{- include "hades.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      annotations:
        # Reinicia el pod cuando cambian el ConfigMap (plugins, modelo, MCP) o
        # los secretos, para que recoja la config nueva (p.ej. activar Langfuse).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: dashboard
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      hostAliases:
        - ip: {{ .Values.vllm.ip | quote }}
          hostnames: [{{ .Values.vllm.host | quote }}]
      initContainers:
        - name: init-config
          image: busybox:1.37
          command: ["/bin/sh", "-c", "cp /init/* {{ .Values.hermesHome }}/"]
          volumeMounts:
            - name: init-config
              mountPath: /init
            - name: data
              mountPath: {{ .Values.hermesHome }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["sleep", "infinity"]
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
          env:
            - name: HERMES_HOME
              value: {{ .Values.hermesHome | quote }}
            {{- if .Values.hermesUid }}
            - name: HERMES_UID
              value: {{ .Values.hermesUid | quote }}
            {{- end }}
            {{- if .Values.hermesGid }}
            - name: HERMES_GID
              value: {{ .Values.hermesGid | quote }}
            {{- end }}
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_INSECURE
              value: {{ ternary "1" "0" .Values.dashboard.insecure | quote }}
            # The dashboard chat (TUI) resolves its toolset via this env, NOT
            # platform_toolsets (which only covers native gateway platforms).
            # Without `web`, web_search isn't bound and the model hallucinates
            # the call as text. Keep in sync with platform_toolsets.cli.
            - name: HERMES_TUI_TOOLSETS
              value: {{ .Values.tuiToolsets | default "terminal,web,browser,file,skills,todo,delegation" | quote }}
            - name: HERMES_LANGFUSE_BASE_URL
              value: {{ .Values.langfuseBaseUrl | quote }}
          envFrom:
            - secretRef:
                name: {{ include "hades.secretName" . }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.hermesHome }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.nyxstrike.sidecar.enabled }}
        # El dashboard tiene embedded-chat: ejecuta el agente y necesita el MCP,
        # igual que el gateway. Mismo bridge stateless contra el server NyxStrike.
        - name: nyxstrike-mcp
          image: {{ .Values.nyxstrike.sidecar.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - {{ .Values.nyxstrike.sidecar.pythonBin | default "/opt/nyxstrike/nyxstrike-env/bin/python3" | quote }}
            - "/opt/nyxstrike/nyxstrike_mcp.py"
            - "--server"
            - "{{ .Values.nyxstrike.url }}"
            - "--profile"
            - {{ .Values.nyxstrike.profile | quote }}
            - "--transport"
            - "http"
            - "--mcp-host"
            - "127.0.0.1"
            - "--mcp-port"
            - {{ .Values.nyxstrike.mcpPort | quote }}
            - "--auth-token"
            - "$(NYXSTRIKE_API_TOKEN)"
          env:
            - name: NYXSTRIKE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "hades.secretName" . }}
                  key: NYXSTRIKE_API_TOKEN
          ports:
            - name: mcp
              containerPort: {{ .Values.nyxstrike.mcpPort }}
        {{- end }}
      volumes:
        - name: init-config
          configMap:
            name: {{ include "hades.fullname" . }}-init-config
        - name: data
          emptyDir: {}
