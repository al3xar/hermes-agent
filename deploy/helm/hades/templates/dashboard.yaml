apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hades.fullname" . }}-dashboard
  labels:
    {{- include "hades.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: dashboard
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      hostAliases:
        - ip: {{ .Values.vllm.ip | quote }}
          hostnames: [{{ .Values.vllm.host | quote }}]
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Mantiene vivo el contenedor; el dashboard corre como servicio s6
          # (espejo del docker-compose `command: [sleep, infinity]`).
          args: ["sleep", "infinity"]
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
          env:
            - name: HERMES_HOME
              value: {{ .Values.hermesHome | quote }}
            - name: HERMES_UID
              value: {{ .Values.hermesUid | quote }}
            - name: HERMES_GID
              value: {{ .Values.hermesGid | quote }}
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_INSECURE
              value: {{ ternary "1" "0" .Values.dashboard.insecure | quote }}
            - name: HERMES_LANGFUSE_BASE_URL
              value: {{ .Values.langfuseBaseUrl | quote }}
          envFrom:
            - secretRef:
                name: {{ include "hades.secretName" . }}
          volumeMounts:
            - name: config
              mountPath: {{ .Values.hermesHome }}/config.yaml
              subPath: config.yaml
              readOnly: true
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "hades.fullname" . }}-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hades.fullname" . }}-dashboard
  labels:
    {{- include "hades.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.dashboard.port }}
      targetPort: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: dashboard
