apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hades.fullname" . }}-gateway
  labels: {{- include "hades.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      annotations:
        # Reinicia el pod cuando cambian el ConfigMap (plugins, modelo, MCP) o
        # los secretos, para que recoja la config nueva (p.ej. activar Langfuse).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      hostAliases:
        - ip: {{ .Values.vllm.ip | quote }}
          hostnames: [{{ .Values.vllm.host | quote }}]
      initContainers:
        - name: init-config
          image: busybox:1.37
          command: ["/bin/sh", "-c", "cp /init/* {{ .Values.hermesHome }}/"]
          volumeMounts:
            - name: init-config
              mountPath: /init
            - name: data
              mountPath: {{ .Values.hermesHome }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Espejo del docker-compose `command: [sleep, infinity]`.
          args: ["sleep", "infinity"]
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          env:
            - name: HERMES_HOME
              value: {{ .Values.hermesHome | quote }}
            - name: HERMES_UID
              value: {{ .Values.hermesUid | quote }}
            - name: HERMES_GID
              value: {{ .Values.hermesGid | quote }}
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: {{ .Values.gateway.port | quote }}
            - name: HERMES_GATEWAY_BOOTSTRAP_STATE
              value: {{ .Values.gateway.bootstrapState | quote }}
            - name: GATEWAY_ALLOW_ALL_USERS
              value: {{ .Values.gateway.allowAllUsers | quote }}
            - name: NYXSTRIKE_URL
              value: {{ .Values.nyxstrike.url | quote }}
            - name: HERMES_LANGFUSE_BASE_URL
              value: {{ .Values.langfuseBaseUrl | quote }}
          envFrom:
            - secretRef:
                name: {{ include "hades.secretName" . }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.hermesHome }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.nyxstrike.sidecar.enabled }}
        - name: nyxstrike-mcp
          image: {{ .Values.nyxstrike.sidecar.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - {{ .Values.nyxstrike.sidecar.pythonBin | default "/opt/nyxstrike/nyxstrike-env/bin/python3" | quote }}
            - "/opt/nyxstrike/nyxstrike_mcp.py"
            - "--server"
            - "{{ .Values.nyxstrike.url }}"
            - "--profile"
            - {{ .Values.nyxstrike.profile | quote }}
            - "--transport"
            - "http"
            - "--mcp-host"
            - "127.0.0.1"
            - "--mcp-port"
            - {{ .Values.nyxstrike.mcpPort | quote }}
            - "--auth-token"
            - "$(NYXSTRIKE_API_TOKEN)"
          env:
            - name: NYXSTRIKE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "hades.secretName" . }}
                  key: NYXSTRIKE_API_TOKEN
          ports:
            - name: mcp
              containerPort: {{ .Values.nyxstrike.mcpPort }}
        {{- end }}
      volumes:
        - name: init-config
          configMap:
            name: {{ include "hades.fullname" . }}-init-config
        - name: data
          emptyDir: {}
