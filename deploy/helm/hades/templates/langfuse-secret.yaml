{{- if .Values.langfuse.enabled }}
# Secretos del stack Langfuse v3. Las claves de proyecto (PUBLIC/SECRET) se
# emparejan con las que usa Hades (secrets.langfuse*) para que la conexión
# quede lista sin pasos manuales. Espejo de las credenciales del docker-compose.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hades.langfuse.secretName" . }}
  labels: {{- include "hades.labels" . | nindent 4 }}
    app.kubernetes.io/component: langfuse
type: Opaque
stringData:
  # Postgres
  POSTGRES_USER: {{ .Values.langfuse.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.langfuse.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.langfuse.postgres.database | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@langfuse-db:5432/%s" .Values.langfuse.postgres.user .Values.langfuse.postgres.password .Values.langfuse.postgres.database | quote }}
  # Núcleo Langfuse
  SALT: {{ .Values.langfuse.secret.salt | quote }}
  ENCRYPTION_KEY: {{ .Values.langfuse.secret.encryptionKey | quote }}
  NEXTAUTH_SECRET: {{ .Values.langfuse.secret.nextauthSecret | quote }}
  # ClickHouse
  CLICKHOUSE_USER: {{ .Values.langfuse.clickhouse.user | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.langfuse.clickhouse.password | quote }}
  # Redis
  REDIS_AUTH: {{ .Values.langfuse.redis.password | quote }}
  # MinIO / S3
  MINIO_ROOT_USER: {{ .Values.langfuse.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.langfuse.minio.rootPassword | quote }}
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: {{ .Values.langfuse.minio.rootUser | quote }}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: {{ .Values.langfuse.minio.rootPassword | quote }}
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: {{ .Values.langfuse.minio.rootUser | quote }}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: {{ .Values.langfuse.minio.rootPassword | quote }}
  # Bootstrap del proyecto/usuario (login del dashboard)
  LANGFUSE_INIT_PROJECT_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  LANGFUSE_INIT_PROJECT_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
  LANGFUSE_INIT_USER_PASSWORD: {{ .Values.langfuse.init.userPassword | quote }}
{{- end }}
