{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hades.fullname" . }}-secrets
  labels: {{- include "hades.labels" . | nindent 4 }}
type: Opaque
stringData:
  ATHENA_VLLM_KEY: {{ .Values.secrets.athenaVllmKey | quote }}
  API_SERVER_KEY: {{ .Values.secrets.apiServerKey | quote }}
  NYXSTRIKE_API_TOKEN: {{ .Values.secrets.nyxstrikeApiToken | quote }}
  HERMES_LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  HERMES_LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
{{- end }}
