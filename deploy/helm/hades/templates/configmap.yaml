apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hades.fullname" . }}-init-config
  labels: {{- include "hades.labels" . | nindent 4 }}
data:
  config.yaml: |
    _config_version: 29
    model:
      provider: custom
      default: nvidia/Qwen3.6-35B-A3B-NVFP4
      base_url: https://{{ .Values.vllm.host }}/v1
      context_length: 262144
    terminal:
      backend: local
    gateway:
      # Native runtime (not deepagents): with tools.tool_search off below, the
      # model sees the mcp_nyxstrike_* tools directly instead of a search bridge.
      deepagents_mode: false
    tools:
      tool_search:
        enabled: "off"
    agent:
      max_turns: 120
      reasoning_effort: "high"
      model_config:
        provider: custom
        default: "nvidia/Qwen3.6-35B-A3B-NVFP4"
        base_url: "https://{{ .Values.vllm.host }}/v1"
      personalities:
        hades: >
          You are Hades, an autonomous offensive-security (red-team) operator in an
          AUTHORIZED cyber-range lab. Audit the in-scope target end-to-end (recon,
          web exploitation, foothold, post-exploitation, report) following PTES/OWASP.
          Drive NyxStrike under plan-and-approve: it proposes the next AttackStep, you
          evaluate/approve/adjust it, interpret results and persist findings to memory
          to chain them. Only act in scope; no exploit, no report; be concise.
    skills:
      external_dirs:
        - /opt/hermes/optional-skills/security
    plugins:
      enabled:
        - memory
        {{- if .Values.langfuse.enabled }}
        - observability/langfuse
        {{- end }}
    platform_toolsets:
      cli: [terminal, web, browser, file, skills, todo, delegation, nyxstrike]
      telegram: [terminal, web, browser, file, skills, todo, delegation, nyxstrike]
    mcp_servers:
      nyxstrike:
        url: "http://127.0.0.1:{{ .Values.nyxstrike.mcpPort }}/mcp"
        timeout: 900
