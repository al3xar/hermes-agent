{{- if and .Values.ingress.enabled .Values.ingress.basicAuth.enabled (not .Values.ingress.basicAuth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hades.fullname" . }}-dashboard-basic-auth
  labels: {{- include "hades.labels" . | nindent 4 }}
type: Opaque
stringData:
  # nginx-ingress espera el fichero 'auth' en formato htpasswd.
  auth: {{ htpasswd .Values.ingress.basicAuth.username .Values.ingress.basicAuth.password | quote }}
{{- end }}
